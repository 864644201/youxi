<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>游戏大厅</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  color: #fff;
  min-height: 100vh;
}
.container { max-width: 900px; margin: 0 auto; padding: 20px; }

/* ---- 大厅 ---- */
.lobby { text-align: center; padding-top: 50px; }
.lobby h1 { font-size: 3em; margin-bottom: 8px; text-shadow: 2px 2px 8px rgba(0,0,0,.4); }
.lobby .subtitle { opacity: .6; margin-bottom: 36px; font-size: 1.05em; }

/* ---- 游戏卡片 ---- */
.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px; margin-bottom: 40px;
}
.game-card {
  background: rgba(255,255,255,.08); border-radius: 18px; padding: 28px;
  backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,.08);
  transition: all .25s; cursor: pointer; text-align: left;
}
.game-card:hover {
  border-color: rgba(240,192,64,.4); background: rgba(255,255,255,.12);
  transform: translateY(-3px);
}
.game-card .gc-icon { font-size: 2.5em; margin-bottom: 10px; }
.game-card .gc-name { font-size: 1.4em; font-weight: bold; margin-bottom: 6px; }
.game-card .gc-desc { opacity: .6; font-size: .9em; margin-bottom: 12px; }
.game-card .gc-meta {
  display: flex; gap: 16px; font-size: .8em; opacity: .5;
}
.gc-btn {
  display: inline-block; margin-top: 14px; padding: 10px 24px;
  border-radius: 10px; font-weight: bold; font-size: .9em;
  background: #f0c040; color: #1a1a1a; text-decoration: none;
  transition: all .2s;
}
.gc-btn:hover { background: #ffd666; transform: translateY(-1px); }

/* ---- 房间列表 ---- */
.rooms-section { max-width: 700px; margin: 0 auto; }
.rooms-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.rooms-header h2 { font-size: 1.2em; }
.btn-sm {
  padding: 6px 14px; font-size: .8em; border: 2px solid rgba(255,255,255,.25);
  border-radius: 10px; background: transparent; color: #fff; cursor: pointer;
  transition: all .2s;
}
.btn-sm:hover { border-color: #fff; }

.room-list { display: flex; flex-direction: column; gap: 10px; }
.room-card {
  background: rgba(255,255,255,.06); border-radius: 14px; padding: 16px 18px;
  cursor: pointer; transition: all .2s; border: 2px solid transparent;
}
.room-card:hover {
  border-color: rgba(46,204,113,.4); background: rgba(255,255,255,.1);
}
.room-card .rc-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.room-card .rc-host { font-weight: bold; }
.room-card .rc-badge {
  padding: 3px 10px; border-radius: 8px; font-size: .75em; font-weight: bold;
}
.rc-badge.bull_bull { background: rgba(240,192,64,.2); color: #f0c040; }
.rc-badge.monopoly { background: rgba(52,152,219,.2); color: #3498db; }
.rc-badge.ludo { background: rgba(46,204,113,.2); color: #2ecc71; }
.room-card .rc-info { font-size: .8em; opacity: .5; }
.room-card .rc-players { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.room-card .rc-tag {
  background: rgba(255,255,255,.08); padding: 2px 10px; border-radius: 10px; font-size: .8em;
}
.empty-state { text-align: center; padding: 30px; opacity: .3; font-size: .95em; }

/* ---- 公告 ---- */
.announcement {
  background: rgba(240,192,64,.1); border: 1px solid rgba(240,192,64,.2);
  border-radius: 12px; padding: 14px 20px; margin: 0 auto 30px; max-width: 500px;
  text-align: left; font-size: .9em; line-height: 1.6;
}
.announcement a { color: #f0c040; }

/* 移动端 */
@media (max-width: 768px) {
  .lobby h1 { font-size: 2em; }
  .games-grid { grid-template-columns: 1fr; }
  .game-card { padding: 20px; }
}
@media (max-width: 480px) {
  .container { padding: 12px; }
  .lobby { padding-top: 30px; }
  .lobby h1 { font-size: 1.6em; }
}
</style>
</head>
<body>

<div class="container">
  <div class="lobby">
    <h1>🎮 游戏大厅</h1>
    <p class="subtitle">局域网多人游戏 · 选择一个游戏开始</p>

    <div class="announcement">
      <strong>欢迎!</strong> 选择下面的游戏创建房间，把地址发给局域网里的朋友即可一起玩。
    </div>

    <div class="user-bar" id="userBar" style="text-align:center;margin-bottom:20px">
      <div id="loggedOut" style="display:inline-flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center">
        <input type="text" id="uName" placeholder="昵称" maxlength="12" style="width:100px;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#fff;font-size:.9em;outline:none;text-align:center">
        <input type="password" id="uPass" placeholder="密码" style="width:100px;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#fff;font-size:.9em;outline:none;text-align:center">
        <button class="btn-sm" onclick="doRegister()" style="background:rgba(52,152,219,.3);border-color:rgba(52,152,219,.5)">注册</button>
        <button class="btn-sm" onclick="doLogin()">登录</button>
      </div>
      <div id="loggedIn" style="display:none">
        <span style="color:#f0c040">👤 <span id="dispName"></span></span>
        <button class="btn-sm" onclick="doLogout()" style="margin-left:8px">退出</button>
      </div>
    </div>

    <div class="games-grid">
      <div class="game-card" onclick="location.href='/bull-bull'">
        <div class="gc-icon">🃏</div>
        <div class="gc-name">牛牛</div>
        <div class="gc-desc">经典纸牌比大小游戏，支持经典模式、加注模式和锦标赛。2-20人对战。</div>
        <div class="gc-meta">
          <span>👥 2-20人</span>
          <span>🎯 经典/加注/锦标赛</span>
        </div>
        <a class="gc-btn" href="/bull-bull">进入游戏</a>
      </div>

      <div class="game-card" onclick="location.href='/monopoly'">
        <div class="gc-icon">🏠</div>
        <div class="gc-name">大富翁</div>
        <div class="gc-desc">商业版大富翁桌游，买地、建房、收租，最后成为唯一的赢家！2-8人对战。</div>
        <div class="gc-meta">
          <span>👥 2-8人</span>
          <span>🎯 经典大富翁</span>
        </div>
        <a class="gc-btn" href="/monopoly">进入游戏</a>
      </div>

      <div class="game-card" onclick="location.href='/ludo'">
        <div class="gc-icon">✈️</div>
        <div class="gc-name">飞行棋</div>
        <div class="gc-desc">经典飞行棋，掷骰子竞速，撞回对手飞机，最先到达终点获胜！2-4人对战。</div>
        <div class="gc-meta">
          <span>👥 2-4人</span>
          <span>🎯 经典飞行棋</span>
        </div>
        <a class="gc-btn" href="/ludo">进入游戏</a>
      </div>
    </div>

    <div style="text-align:center;margin-top:24px">
      <button class="btn-sm" onclick="toggleLeaderboard()" style="border-color:rgba(240,192,64,.4)">排行榜 🏆</button>
    </div>
    <div id="lbPanel" style="display:none;max-width:500px;margin:16px auto">
      <div style="background:rgba(255,255,255,.06);border-radius:12px;padding:16px;border:1px solid rgba(255,255,255,.08)">
        <h3 style="color:#f0c040;margin-bottom:10px">排行榜</h3>
        <div id="lbContent">加载中...</div>
      </div>
    </div>

    <div class="rooms-section">
      <div class="rooms-header">
        <h2>在线房间</h2>
        <button class="btn-sm" onclick="fetchRooms()">刷新</button>
      </div>
      <div id="roomList" class="room-list"></div>
      <div id="roomListEmpty" class="empty-state" style="display:none">暂无可加入的房间</div>
    </div>
  </div>
</div>

<script>
let refreshTimer = null;

function fetchRooms() {
  fetch('/api/rooms')
    .then(r => r.json())
    .then(data => renderRoomList(data.rooms || []))
    .catch(() => {});
}

function renderRoomList(rooms) {
  const grid = document.getElementById('roomList');
  const empty = document.getElementById('roomListEmpty');
  if (rooms.length === 0) {
    grid.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = rooms.map(r => {
    const href = r.game_type === 'monopoly' ? '/monopoly' : r.game_type === 'ludo' ? '/ludo' : '/bull-bull';
    let info = `${r.player_count}/${r.max_players}人`;
    if (r.game_type === 'bull_bull' && r.bet_mode) {
      info = `${r.bet_mode} · ${info}`;
    }
    return `
      <div class="room-card" onclick="location.href='${href}'">
        <div class="rc-top">
          <span class="rc-host">${esc(r.host)} 的房间</span>
          <span class="rc-badge ${r.game_type}">${r.game_name}</span>
        </div>
        <div class="rc-info">${info}</div>
        <div class="rc-players">
          ${r.players.map(p => `<span class="rc-tag">${esc(p)}</span>`).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function esc(s) {
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

// 用户系统
let currentUser = sessionStorage.getItem('currentUser') || '';

function initUser() {
  if (currentUser) {
    document.getElementById('loggedOut').style.display = 'none';
    document.getElementById('loggedIn').style.display = '';
    document.getElementById('dispName').textContent = currentUser;
  }
}

async function doRegister() {
  const name = document.getElementById('uName').value.trim();
  const pass = document.getElementById('uPass').value.trim();
  if (!name || !pass) return toast('请输入昵称和密码');
  const r = await fetch('/api/register', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name, password: pass}) });
  const d = await r.json();
  if (d.ok) { currentUser = name; sessionStorage.setItem('currentUser', name); initUser(); toast('注册成功!'); }
  else toast(d.error);
}

async function doLogin() {
  const name = document.getElementById('uName').value.trim();
  const pass = document.getElementById('uPass').value.trim();
  if (!name || !pass) return toast('请输入昵称和密码');
  const r = await fetch('/api/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name, password: pass}) });
  const d = await r.json();
  if (d.ok) { currentUser = name; sessionStorage.setItem('currentUser', name); initUser(); toast('登录成功!'); }
  else toast(d.error);
}

function doLogout() { currentUser = ''; sessionStorage.removeItem('currentUser'); document.getElementById('loggedOut').style.display = ''; document.getElementById('loggedIn').style.display = 'none'; }

async function toggleLeaderboard() {
  const p = document.getElementById('lbPanel');
  if (p.style.display !== 'none') { p.style.display = 'none'; return; }
  p.style.display = '';
  try {
    const r = await fetch('/api/leaderboard');
    const d = await r.json();
    const lb = d.leaderboard || [];
    document.getElementById('lbContent').innerHTML = lb.length ? `<table style="width:100%;font-size:.85em;border-collapse:collapse">
      <thead><tr style="opacity:.5"><th style="text-align:left;padding:4px">#</th><th style="text-align:left;padding:4px">玩家</th><th style="padding:4px">场次</th><th style="padding:4px">胜场</th><th style="padding:4px">胜率</th></tr></thead>
      <tbody>${lb.map((p,i) => `<tr><td style="padding:4px;color:${i<3?'#f0c040':'inherit'}">${i+1}</td><td style="padding:4px">${esc(p.name)}</td><td style="padding:4px;text-align:center">${p.total_games}</td><td style="padding:4px;text-align:center;color:#2ecc71">${p.total_wins}</td><td style="padding:4px;text-align:center">${p.win_rate}%</td></tr>`).join('')}</tbody></table>` : '暂无数据';
  } catch(e) { document.getElementById('lbContent').textContent = '加载失败'; }
}

function toast(msg) { const t = document.createElement('div'); t.textContent = msg; t.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:10px 20px;border-radius:8px;font-size:.9em;z-index:9999;transition:opacity .3s'; document.body.appendChild(t); setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2000); }

initUser();

// 自动填充昵称
if (currentUser) {
  const ci = document.getElementById('cName');
  const ji = document.getElementById('jName');
  if (ci) ci.value = currentUser;
  if (ji) ji.value = currentUser;
}

fetchRooms();
refreshTimer = setInterval(fetchRooms, 3000);
</script>
</body>
</html>
