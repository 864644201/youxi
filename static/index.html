<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>游戏大厅</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans SC', -apple-system, "Microsoft YaHei", sans-serif;
  min-height: 100vh; color: #e8e6e3;
  background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 35%, #0a1628 65%, #0d1117 100%);
  background-size: 400% 400%; animation: bgShift 20s ease infinite;
}
@keyframes bgShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.container { max-width: 900px; margin: 0 auto; padding: 20px; }

/* ── Glass ── */
.glass{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:16px;transition:all .3s}

/* ── Lobby ── */
.lobby { text-align: center; padding-top: 50px; }
.lobby h1 {
  font-family: 'Orbitron','Noto Sans SC',sans-serif; font-size: 3.2em; font-weight: 900;
  background: linear-gradient(135deg,#ffd700,#ff8f00,#ffd700); background-size: 200% 200%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: gradText 3s ease infinite; letter-spacing: 2px; margin-bottom: 8px;
}
@keyframes gradText{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.lobby .subtitle { color: rgba(255,255,255,.35); margin-bottom: 36px; font-size: 1.05em; letter-spacing: 1px; }

/* ── Game cards ── */
.games-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px; margin-bottom: 40px;
}
.game-card {
  background: rgba(255,255,255,.04); border-radius: 18px; padding: 28px;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.08); transition: all .35s cubic-bezier(.175,.885,.32,1.275);
  cursor: pointer; text-align: left; position: relative; overflow: hidden;
}
.game-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--accent); opacity: 0; transition: opacity .3s;
}
.game-card:hover {
  border-color: rgba(255,255,255,.15); background: rgba(255,255,255,.07);
  transform: translateY(-6px); box-shadow: 0 12px 40px rgba(0,0,0,.3), 0 0 30px var(--glow);
}
.game-card:hover::before { opacity: 1; }
.game-card .gc-icon { font-size: 2.8em; margin-bottom: 12px; filter: drop-shadow(0 2px 8px rgba(0,0,0,.3)); }
.game-card .gc-name { font-size: 1.4em; font-weight: 700; margin-bottom: 6px; }
.game-card .gc-desc { color: rgba(255,255,255,.45); font-size: .9em; margin-bottom: 14px; line-height: 1.5; }
.game-card .gc-meta { display: flex; gap: 16px; font-size: .8em; color: rgba(255,255,255,.3); }
.gc-btn {
  display: inline-block; margin-top: 16px; padding: 10px 28px;
  border-radius: 10px; font-weight: 700; font-size: .9em;
  background: var(--accent); color: #1a1a1a; text-decoration: none;
  transition: all .25s; box-shadow: 0 4px 15px var(--glow);
}
.gc-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--glow), 0 0 25px var(--glow); }

/* Card accents */
.card-bull { --accent: linear-gradient(135deg,#f0c040,#ff8f00); --glow: rgba(255,215,0,.15); }
.card-mono { --accent: linear-gradient(135deg,#4fc3f7,#1565c0); --glow: rgba(79,195,247,.15); }
.card-ludo { --accent: linear-gradient(135deg,#00e676,#00695c); --glow: rgba(0,230,118,.15); }

/* ── Buttons ── */
.btn-sm {
  padding: 7px 16px; font-size: .8em; border: 1px solid rgba(255,255,255,.12);
  border-radius: 10px; background: transparent; color: #fff; cursor: pointer;
  transition: all .25s; font-family: inherit;
}
.btn-sm:hover { border-color: rgba(255,255,255,.25); background: rgba(255,255,255,.05); box-shadow: 0 0 16px rgba(255,255,255,.05); }

/* ── Announcement ── */
.announcement {
  background: rgba(255,215,0,.05); border: 1px solid rgba(255,215,0,.1);
  border-radius: 14px; padding: 16px 22px; margin: 0 auto 32px; max-width: 520px;
  text-align: left; font-size: .9em; line-height: 1.7; color: rgba(255,255,255,.6);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}
.announcement strong { color: #ffd700; }

/* ── User bar ── */
.user-bar input {
  width: 110px; padding: 9px; border-radius: 10px; border: 1px solid rgba(255,255,255,.1);
  background: rgba(255,255,255,.04); color: #fff; font-size: .9em; outline: none;
  text-align: center; transition: all .3s; font-family: inherit;
}
.user-bar input:focus { border-color: rgba(79,195,247,.4); box-shadow: 0 0 0 3px rgba(79,195,247,.1); }

/* ── Rooms ── */
.rooms-section { max-width: 700px; margin: 0 auto; }
.rooms-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.rooms-header h2 { font-size: 1.2em; font-weight: 600; }
.room-list { display: flex; flex-direction: column; gap: 10px; }
.room-card {
  background: rgba(255,255,255,.04); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-radius: 14px; padding: 16px 18px; cursor: pointer;
  transition: all .3s; border: 1px solid transparent;
}
.room-card:hover {
  border-color: rgba(0,230,118,.2); background: rgba(255,255,255,.06);
  transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.2);
}
.room-card .rc-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.room-card .rc-host { font-weight: 600; }
.room-card .rc-badge { padding: 3px 10px; border-radius: 8px; font-size: .75em; font-weight: 600; }
.rc-badge.bull_bull { background: rgba(255,215,0,.12); color: #ffd700; }
.rc-badge.monopoly { background: rgba(79,195,247,.12); color: #4fc3f7; }
.rc-badge.ludo { background: rgba(0,230,118,.12); color: #00e676; }
.room-card .rc-info { font-size: .8em; color: rgba(255,255,255,.35); }
.room-card .rc-players { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.room-card .rc-tag { background: rgba(255,255,255,.06); padding: 2px 10px; border-radius: 10px; font-size: .8em; }
.empty-state { text-align: center; padding: 30px; color: rgba(255,255,255,.25); font-size: .95em; }

/* ── Leaderboard ── */
.lb-panel {
  background: rgba(255,255,255,.04); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 14px; padding: 18px; border: 1px solid rgba(255,255,255,.08);
}
.lb-panel h3 { color: #ffd700; margin-bottom: 12px; font-size: 1em; }

/* ── Toast ── */
.toast {
  position: fixed; top: 24px; left: 50%;
  background: rgba(15,15,30,.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  color: #fff; padding: 12px 24px; border-radius: 12px; font-size: .9em; z-index: 9999;
  border: 1px solid rgba(255,255,255,.08); box-shadow: 0 8px 24px rgba(0,0,0,.4);
  animation: toastIn .4s cubic-bezier(.175,.885,.32,1.275); transition: opacity .3s;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-16px) scale(.9)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}

/* ── Responsive ── */
@media (max-width: 768px) {
  .lobby h1 { font-size: 2.2em; }
  .games-grid { grid-template-columns: 1fr; }
  .game-card { padding: 22px; }
}
@media (max-width: 480px) {
  .container { padding: 12px; }
  .lobby { padding-top: 30px; }
  .lobby h1 { font-size: 1.7em; }
}
</style>
</head>
<body>

<div class="container">
  <div class="lobby">
    <h1>🎮 游戏大厅</h1>
    <p class="subtitle">局域网多人游戏 · 选择一个游戏开始</p>

    <div class="announcement">
      <strong>欢迎!</strong> 选择下面的游戏创建房间，把地址发给局域网里的朋友即可一起玩。
    </div>

    <div class="user-bar" id="userBar" style="text-align:center;margin-bottom:24px">
      <div id="loggedOut" style="display:inline-flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center">
        <input type="text" id="uName" placeholder="昵称" maxlength="12">
        <input type="password" id="uPass" placeholder="密码">
        <button class="btn-sm" onclick="doRegister()" style="border-color:rgba(79,195,247,.3);color:#4fc3f7">注册</button>
        <button class="btn-sm" onclick="doLogin()">登录</button>
      </div>
      <div id="loggedIn" style="display:none">
        <span style="color:#ffd700">👤 <span id="dispName"></span></span>
        <button class="btn-sm" onclick="doLogout()" style="margin-left:8px">退出</button>
      </div>
    </div>

    <div class="games-grid">
      <div class="game-card card-bull" onclick="location.href='/bull-bull'">
        <div class="gc-icon">🃏</div>
        <div class="gc-name">牛牛</div>
        <div class="gc-desc">经典纸牌比大小游戏，支持经典模式、加注模式和锦标赛。2-20人对战。</div>
        <div class="gc-meta">
          <span>👥 2-20人</span>
          <span>🎯 经典/加注/锦标赛</span>
        </div>
        <a class="gc-btn" href="/bull-bull">进入游戏</a>
      </div>

      <div class="game-card card-mono" onclick="location.href='/monopoly'">
        <div class="gc-icon">🏠</div>
        <div class="gc-name">大富翁</div>
        <div class="gc-desc">商业版大富翁桌游，买地、建房、收租，最后成为唯一的赢家！2-8人对战。</div>
        <div class="gc-meta">
          <span>👥 2-8人</span>
          <span>🎯 经典大富翁</span>
        </div>
        <a class="gc-btn" href="/monopoly">进入游戏</a>
      </div>

      <div class="game-card card-ludo" onclick="location.href='/ludo'">
        <div class="gc-icon">✈️</div>
        <div class="gc-name">飞行棋</div>
        <div class="gc-desc">经典飞行棋，掷骰子竞速，撞回对手飞机，最先到达终点获胜！2-4人对战。</div>
        <div class="gc-meta">
          <span>👥 2-4人</span>
          <span>🎯 经典飞行棋</span>
        </div>
        <a class="gc-btn" href="/ludo">进入游戏</a>
      </div>
    </div>

    <div style="text-align:center;margin-top:28px">
      <button class="btn-sm" onclick="toggleLeaderboard()" style="border-color:rgba(255,215,0,.25);color:#ffd700">排行榜 🏆</button>
    </div>
    <div id="lbPanel" style="display:none;max-width:520px;margin:18px auto">
      <div class="lb-panel">
        <h3>排行榜</h3>
        <div id="lbContent">加载中...</div>
      </div>
    </div>

    <div class="rooms-section" style="margin-top:28px">
      <div class="rooms-header">
        <h2>在线房间</h2>
        <button class="btn-sm" onclick="fetchRooms()">刷新</button>
      </div>
      <div id="roomList" class="room-list"></div>
      <div id="roomListEmpty" class="empty-state" style="display:none">暂无可加入的房间</div>
    </div>
  </div>
</div>

<script>
let refreshTimer = null;

function fetchRooms() {
  fetch('/api/rooms')
    .then(r => r.json())
    .then(data => renderRoomList(data.rooms || []))
    .catch(() => {});
}

function renderRoomList(rooms) {
  const grid = document.getElementById('roomList');
  const empty = document.getElementById('roomListEmpty');
  if (rooms.length === 0) {
    grid.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = rooms.map(r => {
    const href = r.game_type === 'monopoly' ? '/monopoly' : r.game_type === 'ludo' ? '/ludo' : '/bull-bull';
    let info = `${r.player_count}/${r.max_players}人`;
    if (r.game_type === 'bull_bull' && r.bet_mode) {
      info = `${r.bet_mode} · ${info}`;
    }
    return `
      <div class="room-card" onclick="location.href='${href}'">
        <div class="rc-top">
          <span class="rc-host">${esc(r.host)} 的房间</span>
          <span class="rc-badge ${r.game_type}">${r.game_name}</span>
        </div>
        <div class="rc-info">${info}</div>
        <div class="rc-players">
          ${r.players.map(p => `<span class="rc-tag">${esc(p)}</span>`).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function esc(s) {
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

// 用户系统
let currentUser = sessionStorage.getItem('currentUser') || '';

function initUser() {
  if (currentUser) {
    document.getElementById('loggedOut').style.display = 'none';
    document.getElementById('loggedIn').style.display = '';
    document.getElementById('dispName').textContent = currentUser;
  }
}

async function doRegister() {
  const name = document.getElementById('uName').value.trim();
  const pass = document.getElementById('uPass').value.trim();
  if (!name || !pass) return toast('请输入昵称和密码');
  const r = await fetch('/api/register', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name, password: pass}) });
  const d = await r.json();
  if (d.ok) { currentUser = name; sessionStorage.setItem('currentUser', name); initUser(); toast('注册成功!'); }
  else toast(d.error);
}

async function doLogin() {
  const name = document.getElementById('uName').value.trim();
  const pass = document.getElementById('uPass').value.trim();
  if (!name || !pass) return toast('请输入昵称和密码');
  const r = await fetch('/api/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name, password: pass}) });
  const d = await r.json();
  if (d.ok) { currentUser = name; sessionStorage.setItem('currentUser', name); initUser(); toast('登录成功!'); }
  else toast(d.error);
}

function doLogout() { currentUser = ''; sessionStorage.removeItem('currentUser'); document.getElementById('loggedOut').style.display = ''; document.getElementById('loggedIn').style.display = 'none'; }

async function toggleLeaderboard() {
  const p = document.getElementById('lbPanel');
  if (p.style.display !== 'none') { p.style.display = 'none'; return; }
  p.style.display = '';
  try {
    const r = await fetch('/api/leaderboard');
    const d = await r.json();
    const lb = d.leaderboard || [];
    document.getElementById('lbContent').innerHTML = lb.length ? `<table style="width:100%;font-size:.85em;border-collapse:collapse">
      <thead><tr style="color:rgba(255,255,255,.35)"><th style="text-align:left;padding:6px">#</th><th style="text-align:left;padding:6px">玩家</th><th style="padding:6px">场次</th><th style="padding:6px">胜场</th><th style="padding:6px">胜率</th></tr></thead>
      <tbody>${lb.map((p,i) => `<tr><td style="padding:6px;color:${i<3?'#ffd700':'inherit'}">${i+1}</td><td style="padding:6px">${esc(p.name)}</td><td style="padding:6px;text-align:center">${p.total_games}</td><td style="padding:6px;text-align:center;color:#00e676">${p.total_wins}</td><td style="padding:6px;text-align:center">${p.win_rate}%</td></tr>`).join('')}</tbody></table>` : '暂无数据';
  } catch(e) { document.getElementById('lbContent').textContent = '加载失败'; }
}

function toast(msg) {
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2000);
}

initUser();
if (currentUser) {
  const ci = document.getElementById('cName');
  const ji = document.getElementById('jName');
  if (ci) ci.value = currentUser;
  if (ji) ji.value = currentUser;
}
fetchRooms();
refreshTimer = setInterval(fetchRooms, 3000);
</script>
</body>
</html>
